name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

jobs:
    release:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [windows-latest, ubuntu-latest, macos-15]

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v6

            - name: Install Node.js, NPM and Yarn
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - name: Build Env Information
              run: |
                  node -v
                  npm -v

            - name: Install dependencies
              run: npm ci

            # The macOS release bundles a patched engine instead of fetching it
            # from the CDN. Stage it into buildResources/engine-macos before the
            # electron build. TODO: wire this up to the real ExaDev engine
            # artifact (cross-repo download-artifact or a published release
            # asset); until then the macOS job fails fast here rather than
            # publishing a DMG with no engine.
            - name: Stage bundled macOS engine
              if: runner.os == 'macOS'
              run: |
                  echo "::error::macOS engine staging not yet wired up - populate buildResources/engine-macos from the ExaDev engine artifact"
                  exit 1

            - name: Electron Build & Publish
              run: |
                  npm run package
                  npm run release
              env:
                  GITHUB_TOKEN: ${{ secrets.github_token }}
                  # Apple notarisation/signing credentials. Absent today, so
                  # electron-builder ad-hoc signs and skips notarisation (the
                  # mac.notarize guard in electron-builder.ts is inert without
                  # APPLE_TEAM_ID). Populate as repo secrets to enable.
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
