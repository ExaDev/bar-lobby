name: Release

on:
    push:
        # Auto-release all platforms on every push to the fork branch; v* tags
        # do the same at a deliberate (non-prerelease) version.
        branches:
            - macos-port
        tags:
            - "v*"
    workflow_dispatch:

# electron-builder creates the GitHub Release, which needs write access.
permissions:
    contents: write

jobs:
    # Every push releases all three platforms: macOS DMG (cask), Linux AppImage,
    # Windows zip (scoop) + nsis installer.
    release:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [windows-latest, ubuntu-latest, macos-15]

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v6

            - name: Install Node.js, NPM and Yarn
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - name: Build Env Information
              run: |
                  node -v
                  npm -v

            - name: Install dependencies
              run: npm ci

            # Fetch the engine from ExaDev/RecoilEngine's latest GitHub Release
            # (published by macos-build-gpu.yml on push to main). Both repos are
            # public, so the default GITHUB_TOKEN reads the release — no PAT.
            - name: Download engine release asset from ExaDev/RecoilEngine
              if: runner.os == 'macOS'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  mkdir -p /tmp/engine-artifact
                  TAG=$(gh release list --repo ExaDev/RecoilEngine --limit 50 \
                    --json tagName,createdAt \
                    --jq '[.[] | select(.tagName | startswith("engine-macos-arm64-"))]
                          | sort_by(.createdAt) | reverse | .[0].tagName')
                  if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
                    echo "::error::No engine-macos-arm64-* release found on ExaDev/RecoilEngine"
                    exit 1
                  fi
                  echo "Using engine release $TAG"
                  gh release download "$TAG" --repo ExaDev/RecoilEngine \
                    --pattern 'engine-macos-arm64-*.tar.gz' --dir /tmp/engine-artifact

            - name: Stage bundled macOS engine
              if: runner.os == 'macOS'
              run: |
                  set -euo pipefail
                  DEST="buildResources/engine-macos"
                  find "$DEST" -mindepth 1 ! -name 'README.md' -delete
                  TARBALL=$(ls /tmp/engine-artifact/engine-macos-arm64-*.tar.gz 2>/dev/null | head -1)
                  if [ -z "$TARBALL" ]; then
                    echo "::error::engine-macos-arm64 tarball not found in downloaded artifact"
                    exit 1
                  fi
                  tar -xzf "$TARBALL" -C "$DEST"
                  echo "Engine artifact staged:"
                  find "$DEST" -not -name 'README.md' | sort | head -40
                  for required in bin/spring bin/spring-headless bin/pr-downloader \
                                  lib game/fonts/FreeSansBold.otf \
                                  game/games/springcontent.sdz \
                                  share/vulkan/icd.d/kosmickrisp.json; do
                    [ -e "$DEST/$required" ] || \
                      { echo "::error::Missing required artifact file: $DEST/$required"; exit 1; }
                  done
                  echo "All required engine files present"

            - name: Electron Build & Publish
              shell: bash
              run: |
                  set -euo pipefail
                  npm run package
                  if [ "${{ github.ref_type }}" = "tag" ]; then
                    # Deliberate version tag: publish at package.json's version.
                    npx electron-builder --publish always
                  else
                    # Auto-release: unique per-push prerelease version so each
                    # push creates its own GitHub release (tag v<version>). The
                    # macOS and Linux matrix legs share the version, so both
                    # assets land on the same release.
                    VERSION="$(jq -r .version package.json)-dev.${{ github.run_number }}"
                    echo "Auto-release version: $VERSION"
                    npx electron-builder --publish always -c.extraMetadata.version="$VERSION"
                  fi
              env:
                  GITHUB_TOKEN: ${{ secrets.github_token }}
                  # Apple notarisation/signing credentials. Absent today, so
                  # electron-builder ad-hoc signs and skips notarisation (the
                  # mac.notarize guard in electron-builder.ts is inert without
                  # APPLE_TEAM_ID). Populate as repo secrets to enable.
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    # Push the cask bump straight into the tap via an SSH deploy key (cascade's
    # pattern): the credential is scoped to homebrew-bar and git-only — no PAT,
    # no API, no polling. Runs after a successful release; the cask tracks the
    # macOS DMG that release published.
    update-cask:
        needs: release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout tap via SSH deploy key
              uses: actions/checkout@v6
              with:
                  repository: ExaDev/homebrew-bar
                  ssh-key: ${{ secrets.TAP_DEPLOY_KEY }}
            - name: Update cask to latest release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  # Latest published (non-draft) bar-lobby release. Sort by
                  # publishedAt: electron-builder stamps every release's
                  # created_at with the tag's commit date, so createdAt can't
                  # order our auto-releases.
                  TAG=$(gh release list --repo ExaDev/bar-lobby --limit 30 \
                    --json tagName,isDraft,publishedAt \
                    --jq '[.[] | select(.isDraft | not) | select(.tagName | startswith("v"))]
                          | sort_by(.publishedAt) | reverse | .[0].tagName')
                  VERSION="${TAG#v}"
                  ASSET="BeyondAllReason-${VERSION}-mac-arm64.dmg"
                  URL="https://github.com/ExaDev/bar-lobby/releases/download/${TAG}/${ASSET}"
                  gh release view "$TAG" --repo ExaDev/bar-lobby --json assets \
                    --jq '.assets[].name' | grep -qx "$ASSET" \
                    || { echo "::error::$ASSET not on $TAG"; exit 1; }
                  # --retry covers the CDN propagation window right after publish.
                  curl -fsSL --retry 6 --retry-delay 5 --retry-all-errors "$URL" -o /tmp/dmg
                  SHA=$(shasum -a 256 /tmp/dmg | cut -d' ' -f1)
                  [[ "$SHA" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::bad sha256: $SHA"; exit 1; }
                  sed -i -E "s/^  version \".*\"/  version \"${VERSION}\"/" Casks/bar-lobby.rb
                  sed -i -E "s/^  sha256 .*/  sha256 \"${SHA}\"/" Casks/bar-lobby.rb
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add Casks/bar-lobby.rb
                  git diff --cached --quiet || git commit -m "bar-lobby ${VERSION}"
                  git push

    # Push the Scoop manifest into the bucket via its own scoped SSH deploy key
    # (cascade's update-scoop pattern). Regenerates bucket/bar-lobby.json fresh.
    update-scoop:
        needs: release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout bucket via SSH deploy key
              uses: actions/checkout@v6
              with:
                  repository: ExaDev/scoop-bar
                  ssh-key: ${{ secrets.SCOOP_DEPLOY_KEY }}
            - name: Update manifest to latest release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  TAG=$(gh release list --repo ExaDev/bar-lobby --limit 30 \
                    --json tagName,isDraft,publishedAt \
                    --jq '[.[] | select(.isDraft | not) | select(.tagName | startswith("v"))]
                          | sort_by(.publishedAt) | reverse | .[0].tagName')
                  VERSION="${TAG#v}"
                  ASSET="BeyondAllReason-${VERSION}-win-x64.zip"
                  URL="https://github.com/ExaDev/bar-lobby/releases/download/${TAG}/${ASSET}"
                  gh release view "$TAG" --repo ExaDev/bar-lobby --json assets \
                    --jq '.assets[].name' | grep -qx "$ASSET" \
                    || { echo "::error::$ASSET not on $TAG"; exit 1; }
                  curl -fsSL --retry 6 --retry-delay 5 --retry-all-errors "$URL" -o /tmp/win.zip
                  SHA=$(shasum -a 256 /tmp/win.zip | cut -d' ' -f1)
                  [[ "$SHA" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::bad sha256: $SHA"; exit 1; }
                  cat > bucket/bar-lobby.json <<JSON
                  {
                      "version": "${VERSION}",
                      "description": "Beyond All Reason lobby client (bar-lobby)",
                      "homepage": "https://github.com/ExaDev/bar-lobby",
                      "license": {
                          "url": "https://github.com/ExaDev/bar-lobby/blob/master/LICENSE.md"
                      },
                      "architecture": {
                          "64bit": {
                              "url": "${URL}",
                              "hash": "${SHA}"
                          }
                      },
                      "shortcuts": [
                          ["BeyondAllReason.exe", "Beyond All Reason"]
                      ],
                      "checkver": {
                          "github": "https://github.com/ExaDev/bar-lobby"
                      },
                      "autoupdate": {
                          "architecture": {
                              "64bit": {
                                  "url": "https://github.com/ExaDev/bar-lobby/releases/download/v\$version/BeyondAllReason-\$version-win-x64.zip"
                              }
                          }
                      }
                  }
                  JSON
                  python3 -c "import json; json.load(open('bucket/bar-lobby.json'))"
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add bucket/bar-lobby.json
                  git diff --cached --quiet || git commit -m "bar-lobby ${VERSION}"
                  git push
