name: Release

on:
    push:
        # Auto-release on every push to the fork's macOS branch (macOS only),
        # plus full multi-platform releases on deliberate v* version tags.
        branches:
            - macos-port
        tags:
            - "v*"
    workflow_dispatch:

# electron-builder creates the GitHub Release, which needs write access.
permissions:
    contents: write

jobs:
    # Branch/dispatch pushes release macOS only (the fork's focus; win/linux are
    # unverified here). A v* tag releases all three platforms.
    setup:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.matrix.outputs.matrix }}
        steps:
            - id: matrix
              run: |
                  if [ "${{ github.ref_type }}" = "tag" ]; then
                    echo 'matrix={"os":["windows-latest","ubuntu-latest","macos-15"]}' >> "$GITHUB_OUTPUT"
                  else
                    echo 'matrix={"os":["macos-15"]}' >> "$GITHUB_OUTPUT"
                  fi

    release:
        needs: setup
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v6

            - name: Install Node.js, NPM and Yarn
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - name: Build Env Information
              run: |
                  node -v
                  npm -v

            - name: Install dependencies
              run: npm ci

            # Fetch the engine from ExaDev/RecoilEngine's latest GitHub Release
            # (published by macos-build-gpu.yml on push to main). Both repos are
            # public, so the default GITHUB_TOKEN reads the release — no PAT.
            - name: Download engine release asset from ExaDev/RecoilEngine
              if: runner.os == 'macOS'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  mkdir -p /tmp/engine-artifact
                  TAG=$(gh release list --repo ExaDev/RecoilEngine --limit 50 \
                    --json tagName,createdAt \
                    --jq '[.[] | select(.tagName | startswith("engine-macos-arm64-"))]
                          | sort_by(.createdAt) | reverse | .[0].tagName')
                  if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
                    echo "::error::No engine-macos-arm64-* release found on ExaDev/RecoilEngine"
                    exit 1
                  fi
                  echo "Using engine release $TAG"
                  gh release download "$TAG" --repo ExaDev/RecoilEngine \
                    --pattern 'engine-macos-arm64-*.tar.gz' --dir /tmp/engine-artifact

            - name: Stage bundled macOS engine
              if: runner.os == 'macOS'
              run: |
                  set -euo pipefail
                  DEST="buildResources/engine-macos"
                  find "$DEST" -mindepth 1 ! -name 'README.md' -delete
                  TARBALL=$(ls /tmp/engine-artifact/engine-macos-arm64-*.tar.gz 2>/dev/null | head -1)
                  if [ -z "$TARBALL" ]; then
                    echo "::error::engine-macos-arm64 tarball not found in downloaded artifact"
                    exit 1
                  fi
                  tar -xzf "$TARBALL" -C "$DEST"
                  echo "Engine artifact staged:"
                  find "$DEST" -not -name 'README.md' | sort | head -40
                  for required in bin/spring bin/spring-headless bin/pr-downloader \
                                  lib game/fonts/FreeSansBold.otf \
                                  game/games/springcontent.sdz \
                                  share/vulkan/icd.d/kosmickrisp.json; do
                    [ -e "$DEST/$required" ] || \
                      { echo "::error::Missing required artifact file: $DEST/$required"; exit 1; }
                  done
                  echo "All required engine files present"

            - name: Electron Build & Publish
              run: |
                  set -euo pipefail
                  npm run package
                  if [ "${{ github.ref_type }}" = "tag" ]; then
                    # Deliberate version tag: publish at package.json's version.
                    npx electron-builder --publish always
                  else
                    # Auto-release: unique per-push prerelease version so each
                    # push creates its own GitHub release (tag v<version>).
                    VERSION="$(jq -r .version package.json)-macos.${{ github.run_number }}"
                    echo "Auto-release version: $VERSION"
                    npx electron-builder --publish always -c.extraMetadata.version="$VERSION"
                  fi
              env:
                  GITHUB_TOKEN: ${{ secrets.github_token }}
                  # Apple notarisation/signing credentials. Absent today, so
                  # electron-builder ad-hoc signs and skips notarisation (the
                  # mac.notarize guard in electron-builder.ts is inert without
                  # APPLE_TEAM_ID). Populate as repo secrets to enable.
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

            # Nudge the Homebrew tap to bump the bar-lobby cask immediately. The
            # tap also polls on a schedule, so this only makes the update instant.
            # Needs HOMEBREW_TAP_TOKEN (a PAT with contents:write on
            # ExaDev/homebrew-bar); inert without it (the scheduled poll covers it).
            - name: Notify Homebrew tap of release
              if: runner.os == 'macOS'
              env:
                  HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
              run: |
                  set -euo pipefail
                  if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
                    echo "HOMEBREW_TAP_TOKEN not set; the tap's scheduled poll will pick up this release."
                    exit 0
                  fi
                  curl -fsSL -X POST \
                    -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/ExaDev/homebrew-bar/dispatches" \
                    -d '{"event_type":"bar-lobby-release"}'
                  echo "Dispatched bar-lobby-release to ExaDev/homebrew-bar"
