name: Release

on:
    push:
        # Auto-release all platforms on every push to the fork branch; v* tags
        # do the same at a deliberate (non-prerelease) version.
        branches:
            - macos-port
        tags:
            - "v*"
    workflow_dispatch:

# electron-builder creates the GitHub Release, which needs write access.
permissions:
    contents: write

jobs:
    # Every push releases all three platforms: macOS DMG (cask), Linux AppImage,
    # Windows zip (scoop) + nsis installer.
    release:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [windows-latest, ubuntu-latest, macos-15]

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v6

            - name: Install Node.js, NPM and Yarn
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - name: Build Env Information
              run: |
                  node -v
                  npm -v

            - name: Install dependencies
              run: npm ci

            # The patched macOS engine is no longer bundled into the DMG. The
            # lobby downloads the latest engine-macos-arm64 release from the
            # public ExaDev/RecoilEngine repo on first run (see
            # src/main/content/engine/macos-engine-install.ts), so there is no
            # engine download/stage step here any more.

            - name: Electron Build & Publish
              shell: bash
              run: |
                  set -euo pipefail
                  npm run package
                  if [ "${{ github.ref_type }}" = "tag" ]; then
                    # Deliberate version tag: publish at package.json's version.
                    npx electron-builder --publish always
                  else
                    # Auto-release: unique per-push prerelease version so each
                    # push creates its own GitHub release (tag v<version>). The
                    # macOS and Linux matrix legs share the version, so both
                    # assets land on the same release.
                    VERSION="$(jq -r .version package.json)-dev.${{ github.run_number }}"
                    echo "Auto-release version: $VERSION"
                    npx electron-builder --publish always -c.extraMetadata.version="$VERSION"
                  fi
              env:
                  GITHUB_TOKEN: ${{ secrets.github_token }}
                  # Apple notarisation/signing credentials. Absent today, so
                  # electron-builder ad-hoc signs and skips notarisation (the
                  # mac.notarize guard in electron-builder.ts is inert without
                  # APPLE_TEAM_ID). Populate as repo secrets to enable.
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    # NOTE: neither the macOS 'bar' cask nor the Windows Scoop 'bar' manifest is
    # bumped here. bar-lobby now publishes only its solo thin DMG and Windows zip
    # (the source apps); ExaDev/BYAR-Chobby's chobby-macos.yml packs this lobby
    # app + the Chobby app into one combined DMG (cask, two app stanzas) and one
    # combined Windows zip (Scoop 'bar', two shortcuts), and owns both buckets.
